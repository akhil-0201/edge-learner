name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy types-requests pyyaml
          pip install -r requirements.txt --no-deps || true

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=12 --max-line-length=120 --statistics

      - name: Type check with mypy
        run: |
          mypy collector/ config/ inference/ trainer/ uploader/ main.py \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-unreachable
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml numpy opencv-python-headless requests

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml \
            --ignore=tests/integration 2>/dev/null || echo "No tests found"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  validate-configs:
    name: Validate Config Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, glob, sys
          errors = []
          for f in glob.glob('config/*.yaml') + glob.glob('config/*.yml'):
              try:
                  yaml.safe_load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('ERRORS:', errors, file=sys.stderr)
              sys.exit(1)
          "
